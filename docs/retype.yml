input: .
output: .retype

url: splicekit.fcp.cafe

favicon: static/favicon.ico

branding:
  title: SpliceKit
  logo: static/splicekit.png

links:

- text: Download
  link: /download/
  icon: desktop-download

- text: Issues
  link: https://github.com/elliotttate/SpliceKit/issues
  icon: issue-opened
  target: blank

- text: Discussions
  link: https://github.com/elliotttate/SpliceKit/discussions
  icon: comment-discussion
  target: blank

- text: Discord
  link: https://ltnt.tv/discord
  icon: comment-discussion
  target: blank

- text: FCP Cafe
  link: https://fcp.cafe
  icon: git-branch
  target: blank

- text: LateNite
  link: https://fcp.cafe/latenite/
  icon: light-bulb
  target: blank

footer:
  copyright: "&copy; Copyright {{ year }} LateNite Films Pty Ltd. All rights reserved."

poweredByRetype: false

edit:
  repo: "https://github.com/latenitefilms/splicekitwebsite"
  base: /docs
  label: Edit this page on GitHub

actions:
  items:
    - text: Copy page
      action: copy-page-markdown
      icon: copy
    - text: Copy link
      action: copy-page-link
      icon: link
    - type: separator
    - text: View as Markdown
      action: view-page-markdown
      icon: markdown
    - text: Print page
      action: print-page
      icon: brand-printer
    - type: separator
    - text: Open in ChatGPT
      icon: brand-openai
      action: open-in-chatgpt
      target: blank
    - text: Open in Claude
      icon: brand-claude
      action: open-in-claude
      target: blank
    - type: separator
    - text: Edit on GitHub
      icon: mark-github
      action: edit-on-github
      target: blank

scheme:
  mode: dark